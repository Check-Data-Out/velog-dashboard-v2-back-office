name: Weekly Newsletter Batch

on:
  workflow_dispatch:
  schedule:
    # 매주 월요일 오전 9시 30분(KST, UTC+9) 실행 -> UTC 기준 00:30 월요일
    - cron: "30 0 * * 1"

jobs:
  weekly-newsletter-batch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.13.0

      - name: Install Poetry
        uses: abatilo/actions-poetry@v2
        with:
          poetry-version: 1.8.4

      - name: Setup a local virtual environment
        run: |
          poetry config virtualenvs.create true --local
          poetry config virtualenvs.in-project true --local

      - name: Define a cache for the virtual environment
        uses: actions/cache@v4
        with:
          path: ./.venv
          key: venv-${{ hashFiles('poetry.lock') }}-${{ runner.os }}

      - name: Install dependencies
        run: poetry install --with dev

      - name: Create .env.prod file
        run: |
          echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> .env.prod
          echo "DEBUG=False" >> .env.prod
          echo "DATABASE_ENGINE=${{ secrets.DATABASE_ENGINE }}" >> .env.prod
          echo "DATABASE_NAME=${{ secrets.DATABASE_NAME }}" >> .env.prod
          echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}" >> .env.prod
          echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env.prod
          echo "POSTGRES_HOST=${{ secrets.POSTGRES_HOST }}" >> .env.prod
          echo "POSTGRES_PORT=${{ secrets.POSTGRES_PORT }}" >> .env.prod
          echo "AES_KEY_0=${{ secrets.AES_KEY_0 }}" >> .env.prod
          echo "AES_KEY_1=${{ secrets.AES_KEY_1 }}" >> .env.prod
          echo "AES_KEY_2=${{ secrets.AES_KEY_2 }}" >> .env.prod
          echo "AES_KEY_3=${{ secrets.AES_KEY_3 }}" >> .env.prod
          echo "AES_KEY_4=${{ secrets.AES_KEY_4 }}" >> .env.prod
          echo "AES_KEY_5=${{ secrets.AES_KEY_5 }}" >> .env.prod
          echo "AES_KEY_6=${{ secrets.AES_KEY_6 }}" >> .env.prod
          echo "AES_KEY_7=${{ secrets.AES_KEY_7 }}" >> .env.prod
          echo "AES_KEY_8=${{ secrets.AES_KEY_8 }}" >> .env.prod
          echo "AES_KEY_9=${{ secrets.AES_KEY_9 }}" >> .env.prod
          echo "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}" >> .env.prod
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> .env.prod
          echo "AWS_REGION=${{ secrets.AWS_REGION }}" >> .env.prod
          echo "DEFAULT_FROM_EMAIL=${{ secrets.DEFAULT_FROM_EMAIL }}" >> .env.prod
          echo "SENTRY_DSN=${{ secrets.SENTRY_DSN }}" >> .env.prod
          echo "SENTRY_TRACES_SAMPLE_RATE=0.2" >> .env.prod

      - name: Run Weekly Newsletter Batch Script
        id: weekly-newsletter-main
        timeout-minutes: 48
        env:
          DJANGO_SETTINGS_MODULE: backoffice.settings.prod
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          set -e
          poetry run python ./insight/tasks/weekly_newsletter_batch.py

      # KST 시간을 GitHub Actions 환경 변수에 세팅
      - name: Get Current KST Time
        if: always()
        run: echo "KST_TIME=$(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV

      # 결과 파일을 읽어 Slack 메시지를 셸에서 안전하게 조립한다.
      # (임의 문자가 payload JSON 을 깨뜨리지 않도록 toJSON 으로 escape)
      - name: Compose Slack Message
        if: always()
        id: compose
        env:
          JOB_STATUS: ${{ job.status }}
          KST_TIME: ${{ env.KST_TIME }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          RESULT=$(cat newsletter_batch_result.txt 2>/dev/null || echo "No output file found")
          if [ "$JOB_STATUS" = "success" ]; then ICON="✅"; else ICON="❌"; fi
          {
            echo "TEXT<<__SLACK_EOF__"
            printf '*Weekly Newsletter Batch*\n\n'
            printf '%s *Status:* %s\n' "$ICON" "$JOB_STATUS"
            printf '📅 *Timestamp (KST):* %s\n' "$KST_TIME"
            printf '📝 *Result:*\n```\n%s\n```\n' "$RESULT"
            printf '🔗 *Workflow URL:* <%s|View Workflow>\n' "$RUN_URL"
            echo "__SLACK_EOF__"
          } >> "$GITHUB_OUTPUT"

      # toJSON 으로 escape — payload JSON 이 절대 깨지지 않는다 (성공/실패 공통)
      - name: Send Slack Notification
        if: always()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": ${{ toJSON(steps.compose.outputs.TEXT) }}
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
